<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Recipe Book is a searchable collection of recipes that starts with a random recipe and filters by keyword.">
    <title>Recipe Book</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand-mark" aria-hidden="true">RB</div>
            <div>
                <p class="eyebrow">Recipe collection</p>
                <h1>Recipe Book</h1>
            </div>
        </header>

        <main>
            <form class="search-form" role="search">
                <label class="sr-only" for="recipe-search">Search recipes</label>
                <input id="recipe-search" name="recipe-search" type="search" placeholder="Search by name, description, or tag">
                <button type="submit">Search</button>
            </form>

            <p class="results-summary" id="results-summary" aria-live="polite"></p>
            <section class="recipe-results" id="recipe-results" aria-live="polite"></section>
        </main>
    </div>
</body>
</html>
