<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="RecipeBook is a searchable collection of recipes that starts with a random recipe and filters by keyword.">
	<meta property="og:title" content="RecipeBook">
	<meta property="og:description" content="A responsive apple crisp recipe page built with flexbox.">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://neyochim.github.io/wdd131/prove/recepie-book/recepie-book.html">
	<meta property="og:image" content="https://neyochim.github.io/wdd131/prove/recepie-book/assets/social-preview.png">
	<meta property="og:image:width" content="1200">
	<meta property="og:image:height" content="630">
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="RecipeBook">
	<meta name="twitter:description" content="A searchable recipe book that starts with a random recipe and filters by keyword.">
	<meta name="twitter:image" content="https://neyochim.github.io/wdd131/prove/recepie-book/assets/social-preview.png">
	<link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
	<link rel="icon" href="./assets/apple-touch-icon.png">
	<link rel="stylesheet" href="recepie-book.css">
	<script src="recepie-book.js" defer></script>
	<title>RecipeBook</title>
</head>
<body>
	<div class="page-shell">
		<header class="site-header">
			<img class="brand-mark" src="./assets/recipe-book.png" alt="RecipeBook logo">
			<div>
				<p class="eyebrow">Recipe collection</p>
				<h1>RecipeBook</h1>
			</div>
		</header>

		<main>
			<form class="search-form" role="search">
				<label class="sr-only" for="recipe-search">Search recipes</label>
				<input id="recipe-search" name="recipe-search" type="search" placeholder="Search by name, description, or tag">
				<button type="submit" aria-label="Search recipes">
					<img src="./assets/search.svg" alt="" aria-hidden="true">
				</button>
			</form>

			<p class="results-summary" id="results-summary" aria-live="polite"></p>
			<section class="recipe-results" id="recipe-results" aria-live="polite"></section>
		</main>

		<footer class="site-footer">
			<p class="attribution">
				<a href="https://www.flaticon.com/free-icons/recipe">Recipe icons created by Freepik - Flaticon</a>
			</p>
			<nav class="social-links" aria-label="Social media links">
				<a href="#" aria-label="YouTube">
					<img src="./assets/youtube_icon.svg" alt="">
				</a>
				<a href="#" aria-label="Instagram">
					<img src="./assets/instagram_icon.svg" alt="">
				</a>
				<a href="#" aria-label="Pinterest">
					<img src="./assets/pinterest_icon.svg" alt="">
				</a>
			</nav>
		</footer>
	</div>
</body>
</html>
