<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A character card that uses a JavaScript object with attacked and levelUp methods.">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="A JavaScript character card that tracks level and health with object methods.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://neyochim.github.io/wdd131/charactercard/">
    <meta property="og:image" content="https://andejuli.github.io/wdd131/character_card/snortleblat.webp">
    <meta property="og:image:alt" content="Swamp Beast Diplomat character portrait">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="A JavaScript character card that tracks level and health with object methods.">
    <meta name="twitter:image" content="https://andejuli.github.io/wdd131/character_card/snortleblat.webp">
    <title>Character Card</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="card" aria-labelledby="character-name">
        <img class="image" id="character-image" alt="">
        <h1 class="name" id="character-name"></h1>
        <section class="stats" aria-label="Character statistics">
            <p><strong>Class:</strong> <span id="character-class"></span></p>
            <p><strong>Level:</strong> <span id="character-level"></span></p>
            <p><strong>Health:</strong> <span id="character-health"></span></p>
            <p id="status-message" class="status" aria-live="polite"></p>
        </section>
        <section class="buttons" aria-label="Character actions">
            <button type="button" id="attack-button">Attack</button>
            <button type="button" id="levelup-button">Level Up</button>
        </section>
    </main>
</body>
</html>
